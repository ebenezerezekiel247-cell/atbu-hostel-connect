kind = "web"
previewPath = "/"
title = "ATBU Hostel Connect"
version = "1.0.0"
id = "artifacts/atbu-hostel-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21736

[services.development]
run = "pnpm --filter @workspace/atbu-hostel-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atbu-hostel-connect", "run", "build" ]
publicDir = "artifacts/atbu-hostel-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21736"
BASE_PATH = "/"
